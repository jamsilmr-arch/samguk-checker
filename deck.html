<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>삼국지 왕전 - 덱 구성</title>
    <link rel="stylesheet" href="deck.css">
</head>
<body>
    <header class="top-title-header">
        <h1>삼국지 왕전</h1>
        <span class="author-text">by JHP</span>
    </header>

    <!-- 공통 네비게이션 바 엔진 -->
    <script src="navbar.js"></script>

    <div style="max-width: 1300px; margin: 20px auto 0 auto; padding: 0 20px; display: flex; gap: 10px;">
        <button id="sort-default-btn" class="control-sort-btn active" onclick="toggleSortMode('default')">부대 순서 고정 (1군~5군)</button>
        <button id="sort-score-btn" class="control-sort-btn" onclick="toggleSortMode('score')">추천도 높은 순 정렬</button>
    </div>

    <main class="deck-main-container" id="deck-container" style="margin-top: 15px;"></main>

    <!-- 3개 분리 구조 가동을 위한 진입점 UI 모듈 바인딩 -->
    <script type="module" src="deck_ui.js"></script>
</body>
</html>
