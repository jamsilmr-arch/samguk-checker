<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>삼국지 왕전 - 시스템 가이드</title>
    <link rel="stylesheet" href="guide.css">
</head>
<body>
    <!-- 글로벌 상단 타이틀 헤더 -->
    <header class="top-title-header">
        <h1>삼국지 왕전</h1>
        <span class="author-text">by JHP</span>
    </header>

    <!-- 시스템 가이드 메인 레이아웃 (사이드바 + 콘텐츠) -->
    <main class="guide-main-container">
        <aside class="guide-sidebar">
            <button class="guide-tab-btn active" onclick="switchGuideTab('equip', this)">장비 시스템</button>
            <button class="guide-tab-btn" onclick="switchGuideTab('hawk', this)">매 시스템</button>
            <button class="guide-tab-btn" onclick="switchGuideTab('officer', this)">무장 시스템</button>
            <button class="guide-tab-btn" onclick="switchGuideTab('status', this)">속성 및 상태 이상</button>
        </aside>
        
        <section class="guide-content-area" id="guide-content-box">
            <!-- 자바스크립트가 데이터를 동적으로 주입하는 구역 -->
        </section>
    </main>

    <script src="guide.js"></script>
</body>
</html>
