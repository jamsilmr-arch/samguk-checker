<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>삼국지 왕전 </title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 타이틀 헤더 영역 -->
    <header class="top-title-header">
        <h1>삼국지 왕전 </h1>
        <span class="author-text">by JHP</span>
    </header>

    <!-- 우측 정렬 저장 버튼 영역 -->
    <div style="padding: 20px 0; max-width: 1200px; margin: 0 auto; display: flex; justify-content: flex-end;">
        <button id="save-btn" onclick="saveData()">기록 저장</button>
    </div>

    <!-- 메인 대시보드 레이아웃 -->
    <main class="container">
        <!-- 좌측 무장 섹션 -->
        <section class="section-box">
            <h2>장수 현황</h2>
            
            <div class="group-title wei">위나라</div>
            <div class="grid-container" id="hero-container-wei"></div>

            <div class="group-title shu">촉나라</div>
            <div class="grid-container" id="hero-container-shu"></div>

            <div class="group-title wu">오나라</div>
            <div class="grid-container" id="hero-container-wu"></div>

            <div class="group-title qun">군나라</div>
            <div class="grid-container" id="hero-container-qun"></div>
        </section>

        <!-- 우측 전법 섹션 -->
        <section class="section-box">
            <h2>전법 현황</h2>
            <div class="grid-container" id="tactic-container"></div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
